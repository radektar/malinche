<!doctype html>
<html lang="pl"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --terracotta:#C24010;--jade:#057857;--gold:#D6B033;
  --cream-hi:#FAF3E2;--ink:#241E18;--ink-soft:#5A4E42;--line:rgba(36,30,24,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);
  width:520px;height:560px;display:grid;place-items:center;
  background:linear-gradient(160deg,#2A2530,#1C1922);-webkit-font-smoothing:antialiased}
/* faux menubar tab above the panel */
.stage{position:relative}
.tab{position:absolute;top:-30px;right:26px;display:flex;align-items:center;gap:.45rem;
  font-size:.82rem;font-weight:600;color:rgba(255,255,255,.92);background:rgba(255,255,255,.16);
  padding:.28rem .6rem;border-radius:7px;backdrop-filter:blur(6px)}
.tab svg{width:15px;height:15px}
.panel{width:340px;background:rgba(250,243,226,.96);border-radius:16px;overflow:hidden;
  box-shadow:0 30px 70px -24px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.5);
  backdrop-filter:blur(20px)}
.head{display:flex;align-items:center;gap:.7rem;padding:1rem 1.1rem .9rem;border-bottom:1px solid var(--line)}
.head .ic{width:30px;height:30px;border-radius:9px;background:linear-gradient(180deg,#FBF4E4,#F1E4C6);
  display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(120,52,20,.12)}
.head .nm{font-family:"Fraunces",serif;font-weight:600;font-size:1.04rem}
.head .st{margin-left:auto;display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;font-weight:600;color:var(--jade)}
.head .st::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--jade);box-shadow:0 0 0 3px rgba(5,120,87,.16)}
.now{padding:.9rem 1.1rem;border-bottom:1px solid var(--line)}
.now .lab{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
.now .big{font-family:"Fraunces",serif;font-weight:500;font-size:1.18rem;margin-top:.25rem;letter-spacing:-.01em}
.list{padding:.5rem .6rem}
.row{display:flex;align-items:center;gap:.7rem;padding:.5rem .55rem;border-radius:9px}
.row .tick{width:16px;height:16px;flex:0 0 auto;color:var(--jade)}
.row .spin{width:14px;height:14px;flex:0 0 auto;border:2px solid rgba(194,64,16,.25);border-top-color:var(--terracotta);border-radius:50%}
.row .t{font-size:.9rem;flex:1}
.row .t b{font-weight:600}
.row .meta{font-size:.76rem;color:var(--ink-soft)}
.foot{display:flex;gap:.5rem;padding:.7rem 1.1rem 1rem}
.foot a{flex:1;text-align:center;font-size:.84rem;font-weight:600;text-decoration:none;
  padding:.55rem;border-radius:9px;border:1px solid var(--line);color:var(--ink)}
.foot a.pri{background:var(--terracotta);color:#fff;border-color:transparent}
</style></head>
<body>
  <div class="stage">
    <div class="tab">
      <svg viewBox="0 0 22 22"><g fill="#fff">
        <rect x="3" y="7" width="1.3" height="8" rx=".2"/><rect x="6" y="4.5" width="1.3" height="13" rx=".2"/>
        <rect x="9" y="3" width="1.3" height="16" rx=".2"/><rect x="12" y="4.5" width="1.3" height="13" rx=".2"/>
        <rect x="15" y="7" width="1.3" height="8" rx=".2"/></g></svg>
    </div>
    <div class="panel">
      <div class="head">
        <span class="ic"><svg width="17" height="17" viewBox="0 0 22 22"><g fill="#C24010">
          <rect x="3" y="7" width="1.3" height="8" rx=".2"/><rect x="6" y="4.5" width="1.3" height="13" rx=".2"/>
          <rect x="9" y="3" width="1.3" height="16" rx=".2"/><rect x="12" y="4.5" width="1.3" height="13" rx=".2"/>
          <rect x="15" y="7" width="1.3" height="8" rx=".2"/></g></svg></span>
        <span class="nm">Malinche</span>
        <span class="st">Nasłuchuję</span>
      </div>
      <div class="now">
        <div class="lab">Dziś przepisane lokalnie</div>
        <div class="big">3 nagrania · 1 h 12 min</div>
      </div>
      <div class="list">
        <div class="row">
          <svg class="tick" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8.5l3 3 7-7"/></svg>
          <div class="t"><b>telefon-kowalski-04-05</b><div class="meta">karta SD · 18 min · gotowe</div></div>
        </div>
        <div class="row">
          <svg class="tick" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8.5l3 3 7-7"/></svg>
          <div class="t"><b>spacer-pomysl-21-05</b><div class="meta">dyktafon · 6 min · gotowe</div></div>
        </div>
        <div class="row">
          <div class="spin"></div>
          <div class="t"><b>narada-zespol-21-05</b><div class="meta">karta SD · przepisuję… 48%</div></div>
        </div>
      </div>
      <div class="foot">
        <a href="#">Otwórz vault</a>
        <a href="#" class="pri">Zapytaj zbiór</a>
      </div>
    </div>
  </div>
</body></html>
